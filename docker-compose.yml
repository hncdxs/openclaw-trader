version: "3.9"

services:
  # 🦞 OpenClaw AI 引擎
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: openclaw-engine
    restart: unless-stopped
    ports:
      - "18789:18789"   # OpenClaw Gateway
    env_file:
      - .env
    volumes:
      - openclaw_data:/root/.openclaw   # 持久化配置
      - ./backend/skills:/root/.openclaw/workspace/skills  # 策略 skills
      - ./backend/config/openclaw.json:/root/.openclaw/openclaw.json  # 配置
    environment:
      - TZ=Asia/Shanghai
      - OPENCLAW_PROFILE=production
      - OPENCLAW_GATEWAY_TOKEN=trader123
    command: ["openclaw", "gateway", "--allow-unconfigured", "--port", "18789", "--token", "trader123", "--bind", "lan"]
    networks:
      - trader-net

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openclaw-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - openclaw_data:/root/.openclaw:ro  # 只读访问 openclaw 配置
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=postgresql+asyncpg://trader:trader_pass@postgres:5432/crypto_trader
      - OPENCLAW_CONFIG_DIR=/root/.openclaw
    depends_on:
      openclaw:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - trader-net

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: openclaw-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=crypto_trader
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=trader_pass
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d crypto_trader"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trader-net

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openclaw-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - trader-net

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - trader-net

volumes:
  postgres_data:
  openclaw_data:

networks:
  trader-net:
    driver: bridge
